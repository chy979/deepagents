# Builds and publishes the async-subagent-server Docker image to ghcr.io.
#
# Image: ghcr.io/<owner>/deepagents/async-subagent-server
#
# Triggers:
#   - Push to main (publishes tag: latest + short SHA)
#   - Push of a semver tag  examples/async-subagent-server/v*
#     (publishes tags: v1, v1.2, v1.2.3, latest)
#   - Manual via workflow_dispatch
#
# Build context is the repository root so that libs/deepagents
# (a local editable dependency) is available inside the build.

name: "Docker publish — async-subagent-server"

on:
  push:
    branches:
      - main
    tags:
      - "examples/async-subagent-server/v*"
    paths:
      # Rebuild when the server code, its Dockerfile, or the shared library changes
      - "examples/async-subagent-server/**"
      - "libs/deepagents/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:
    inputs:
      push:
        description: "Push image to ghcr.io? (set to false for a dry-run build)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/<repo>/async-subagent-server
  IMAGE_NAME: ${{ github.repository_owner }}/deepagents/async-subagent-server

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # ── Docker Buildx ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730b99d32bee3cf67b2ea0a11f1d9bdf7a6a4e # v3

      # ── Login to ghcr.io ───────────────────────────────────────────────────
      # GITHUB_TOKEN is automatically provided — no extra secret needed.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Image metadata & tags ──────────────────────────────────────────────
      # Tag strategy:
      #   branch push (main)  → sha-<short>, edge
      #   semver tag          → v1, v1.2, v1.2.3, latest
      #   workflow_dispatch   → sha-<short>, manual
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a68ae27b6b7bda34c59e7e1 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # short SHA on every push
            type=sha,prefix=sha-,format=short
            # "edge" on pushes to main
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            # "latest" + semver tags on version tags
            type=semver,pattern={{version}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/examples/async-subagent-server/v') }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/examples/async-subagent-server/v') }}
            type=semver,pattern={{major}},value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/examples/async-subagent-server/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/examples/async-subagent-server/v') }}
            # "manual" on workflow_dispatch
            type=raw,value=manual,enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=async-subagent-server
            org.opencontainers.image.description=Self-hosted Agent Protocol server exposing a DeepAgents researcher as an async subagent
            org.opencontainers.image.source=https://github.com/${{ github.repository }}/tree/main/examples/async-subagent-server

      # ── Build & push ───────────────────────────────────────────────────────
      # Build context is the repo root so COPY libs/deepagents works.
      # The Dockerfile lives inside the example subdirectory.
      - name: Build and push Docker image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: .
          file: examples/async-subagent-server/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache: store in ghcr.io alongside the image
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## Docker build summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | \`${{ env.REGISTRY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Ref** | \`${{ github.ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags published" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
